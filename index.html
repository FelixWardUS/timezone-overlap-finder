<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timezone Overlap Finder</title>
    <meta
      name="description"
      content="Find overlapping working hours across two or three time zones, including overnight schedules and date-sensitive shifts."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div id="masthead-root" class="page-masthead"></div>

      <main class="page-main">
        <section class="tool-shell" aria-labelledby="tool-heading">
          <div class="tool-shell__intro">
            <div>
              <p class="eyebrow" id="tool-eyebrow"></p>
              <h2 id="tool-heading"></h2>
            </div>
            <p class="compat-note" hidden></p>
          </div>

          <div class="tool-shell__layout">
            <section class="control-card"></section>
            <section id="results-panel" class="results-panel"></section>
          </div>
        </section>

        <section class="explanation" aria-labelledby="explanation-heading">
          <h2 id="explanation-heading"></h2>
          <p id="explanation-copy"></p>
        </section>
      </main>
    </div>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
